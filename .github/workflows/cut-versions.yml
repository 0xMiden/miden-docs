# ============================================================
# ARCHITECTURE NOTE:
# This workflow ingests external repos and creates versioned snapshots.
#
# v0.4 Information Architecture:
#   - Core Concepts docs (protocol, miden-vm, compiler, node) → docs/core-concepts/
#   - Builder docs (tutorials, miden-client) → docs/builder/tutorials/, docs/builder/tools/client/
#
# Workflow responsibilities:
#   1. Check out external repos at pinned refs
#   2. Aggregate their docs into docs/ TEMPORARILY (v0.4 nested paths)
#   3. Run `docusaurus docs:version` to snapshot into versioned_docs/
#   4. CLEAN UP docs/ (remove ingested folders)
#   5. Commit versioned_docs/ snapshot
#
# After this workflow runs, docs/ returns to authored-only state.
# The deploy workflow (deploy-docs.yml) also ingests for live "next" docs.
# ============================================================

name: Cut Docs Version (global)

on:
  # Manual trigger (preferred to start)
  workflow_dispatch:
    inputs:
      version_label:
        description: "Global version label (e.g. 0.12). If empty, use .release/release-manifest.yml"
        required: false
      # Optional per-repo overrides. If empty, use refs from manifest.
      miden_node_ref: { required: false }
      miden_vm_ref: { required: false }
      miden_base_ref: { required: false }
      miden_client_ref: { required: false }
      compiler_ref: { required: false }
      miden_tutorials_ref: { required: false }

  # Auto-run when manifest changes on a branch (NOT main — prevents re-triggering on merge)
  push:
    branches-ignore: [main]
    paths:
      - ".release/release-manifest.yml"

permissions:
  contents: write

jobs:
  cut:
    runs-on: ubuntu-latest
    env:
      REPO_NODE: 0xMiden/node
      REPO_VM: 0xMiden/miden-vm
      REPO_BASE: 0xMiden/protocol
      REPO_CLIENT: 0xMiden/miden-client
      REPO_COMPILER: 0xMiden/compiler
      REPO_TUTORIALS: 0xMiden/tutorials
    steps:
      - name: Checkout aggregator
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: 20, cache: "npm" }

      - name: Install deps
        run: npm ci

      - name: Parse release manifest (and merge with manual inputs)
        id: manifest
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = '.release/release-manifest.yml';
          const YAML = require('yaml');

          const read = (p) => fs.existsSync(p) ? fs.readFileSync(p, 'utf8') : '';
          const m = YAML.parse(read(path) || '{}') || {};

          // Prefer manual inputs if provided; else manifest; else fallback to "main"
          const getRef = (input, manifestVal) => input && input.trim() ? input.trim() : (manifestVal || 'main');

          const inputs = {
            version_label: process.env.INPUT_VERSION_LABEL || ''
          };

          const refs = m.refs || {};

          // Build outputs
          const out = {
            version_label: inputs.version_label || (m.version || '').trim(),
            miden_node_ref:      getRef(process.env.INPUT_MIDEN_NODE_REF,      refs['node']),
            miden_vm_ref:        getRef(process.env.INPUT_MIDEN_VM_REF,        refs['miden-vm']),
            miden_base_ref:      getRef(process.env.INPUT_MIDEN_BASE_REF,      refs['protocol']),
            miden_client_ref:    getRef(process.env.INPUT_MIDEN_CLIENT_REF,    refs['miden-client']),
            compiler_ref:  getRef(process.env.INPUT_COMPILER_REF,  refs['compiler']),
            miden_tutorials_ref: getRef(process.env.INPUT_MIDEN_TUTORIALS_REF, refs['tutorials']),
          };

          if (!out.version_label) {
            console.error('No version label provided (inputs.version_label empty and no "version" in release-manifest).');
            process.exit(1);
          }

          // Emit outputs
          for (const [k,v] of Object.entries(out)) {
            console.log(`::set-output name=${k}::${v}`);
          }
          NODE

      - name: Validate refs exist
        run: |
          set -e
          validate() {
            repo="$1"; ref="$2"
            echo "Validating $repo @ $ref"
            git ls-remote "https://github.com/$repo" "$ref" | grep -q . || {
              echo "ERROR: Ref '$ref' not found in $repo"
              exit 1
            }
          }
          validate "${REPO_NODE}"      "${{ steps.manifest.outputs.miden_node_ref }}"
          validate "${REPO_VM}"        "${{ steps.manifest.outputs.miden_vm_ref }}"
          validate "${REPO_BASE}"      "${{ steps.manifest.outputs.miden_base_ref }}"
          validate "${REPO_CLIENT}"    "${{ steps.manifest.outputs.miden_client_ref }}"
          validate "${REPO_COMPILER}"  "${{ steps.manifest.outputs.compiler_ref }}"
          validate "${REPO_TUTORIALS}" "${{ steps.manifest.outputs.miden_tutorials_ref }}"

      - name: Checkout sources at validated refs
        run: |
          set -e
          checkout_ref() {
            repo="$1"; ref="$2"; path="$3"
            echo "Checking out $repo @ $ref → $path"
            git clone "https://github.com/$repo" "$path"
            (cd "$path" && git fetch --depth 1 origin "$ref" && git checkout "$ref")
          }
          checkout_ref "${REPO_NODE}"      "${{ steps.manifest.outputs.miden_node_ref }}"      vendor/node
          checkout_ref "${REPO_VM}"        "${{ steps.manifest.outputs.miden_vm_ref }}"        vendor/miden-vm
          checkout_ref "${REPO_BASE}"      "${{ steps.manifest.outputs.miden_base_ref }}"      vendor/protocol
          checkout_ref "${REPO_CLIENT}"    "${{ steps.manifest.outputs.miden_client_ref }}"    vendor/miden-client
          checkout_ref "${REPO_COMPILER}"  "${{ steps.manifest.outputs.compiler_ref }}"  vendor/compiler
          checkout_ref "${REPO_TUTORIALS}" "${{ steps.manifest.outputs.miden_tutorials_ref }}" vendor/tutorials

      # ============================================================
      # v0.4 IA: Aggregate into nested structure (TEMPORARY)
      # This content is cleaned up after versioning (see "Clean up" step below)
      # ============================================================
      - name: Aggregate docs into v0.4 IA structure
        run: |
          echo "Aggregating vendor docs into v0.4 IA structure..."

          # Clean directories that will be re-synced (v0.4 nested paths)
          rm -rf docs/core-concepts/protocol docs/core-concepts/miden-vm docs/core-concepts/node docs/core-concepts/compiler
          # tools/clients: only clean ingested subdirs; preserve locally-authored web-client/, react-sdk/, index.md
          rm -rf docs/builder/tools/clients/rust-client
          rm -rf docs/builder/tools/clients/img
          rm -rf docs/builder/tools/clients/theme
          rm -f  docs/builder/tools/clients/common-errors.md
          rm -f  docs/builder/tools/clients/_category_.yml
          rm -rf docs/builder/tools/cli
          # tutorials: only clean ingested subdirs/files; preserve locally-authored rust-compiler/, index.md, _category_.json
          rm -rf docs/builder/tutorials/miden-bank
          rm -rf docs/builder/tutorials/components
          rm -rf docs/builder/tutorials/img
          rm -rf docs/builder/tutorials/theme
          rm -f  docs/builder/tutorials/miden_node_setup.md

          # Core Concepts docs → docs/core-concepts/*
          if [ -d "vendor/protocol/docs/src" ]; then
            mkdir -p docs/core-concepts/protocol
            cp -r vendor/protocol/docs/src/* docs/core-concepts/protocol/
            echo "Synced protocol → docs/core-concepts/protocol"
          fi

          if [ -d "vendor/miden-vm/docs/src" ]; then
            mkdir -p docs/core-concepts/miden-vm
            cp -r vendor/miden-vm/docs/src/* docs/core-concepts/miden-vm/
            echo "Synced miden-vm → docs/core-concepts/miden-vm"
          fi

          if [ -d "vendor/node/docs/external/src" ]; then
            mkdir -p docs/core-concepts/node
            cp -r vendor/node/docs/external/src/* docs/core-concepts/node/
            echo "Synced node → docs/core-concepts/node"
          fi

          if [ -d "vendor/compiler/docs/external/src" ]; then
            mkdir -p docs/core-concepts/compiler
            cp -r vendor/compiler/docs/external/src/* docs/core-concepts/compiler/
            echo "Synced compiler → docs/core-concepts/compiler"
          fi

          # Builder docs → docs/builder/*
          # Sync tutorials into tutorials — selective ingest.
          # rust-compiler/, index.md, and _category_.json are locally authored
          # in the docs repo and preserved through this clean/ingest cycle.
          # rust-client/, web-client/, lib.rs, and _category_.yml are deliberately
          # NOT ingested — rust-client and web-client already live at
          # /builder/tools/clients/ (canonical SDK location) and the other two
          # are not doc content.
          if [ -d "vendor/tutorials/docs/src" ]; then
            mkdir -p docs/builder/tutorials
            for name in miden-bank components img theme; do
              src="vendor/tutorials/docs/src/$name"
              [ -d "$src" ] && cp -r "$src" docs/builder/tutorials/
            done
            for name in miden_node_setup.md; do
              src="vendor/tutorials/docs/src/$name"
              [ -f "$src" ] && cp    "$src" docs/builder/tutorials/
            done
            echo "Synced tutorials (miden-bank, components, img, theme, miden_node_setup.md) → docs/builder/tutorials"
          fi

          if [ -d "vendor/miden-client/docs/external/src" ]; then
            mkdir -p docs/builder/tools/clients
            # Selective ingestion: only subdirs/files we still auto-sync from miden-client.
            # web-client/, react-sdk/, and top-level index.md are locally authored in the docs repo
            # — they are preserved through this clean/ingest cycle.
            for name in rust-client img theme; do
              src="vendor/miden-client/docs/external/src/$name"
              [ -d "$src" ] && cp -r "$src" docs/builder/tools/clients/
            done
            for name in common-errors.md _category_.yml; do
              src="vendor/miden-client/docs/external/src/$name"
              [ -f "$src" ] && cp "$src" docs/builder/tools/clients/
            done
            echo "Synced miden-client (rust-client, img, theme, common-errors, _category_) → docs/builder/tools/clients"
          fi

          echo "Content aggregation complete. Final docs structure:"
          ls -la docs/
          echo "Core Concepts subdirs:"
          ls -la docs/core-concepts/ || true
          echo "Builder subdirs:"
          ls -la docs/builder/ || true
          echo "Tutorials subdirs:"
          ls -la docs/builder/tutorials/ || true

      - name: Cut version snapshot
        run: |
          VERSION="${{ steps.manifest.outputs.version_label }}"
          echo "Creating Docusaurus version: $VERSION"
          npm run docusaurus -- docs:version "$VERSION"

      # CRITICAL: Clean up docs/ to maintain canonical-source architecture
      # docs/ must only contain authored content (builder/, core-concepts/ landing pages)
      # All ingested content lives in versioned_docs/ after versioning
      - name: Clean up (delete vendor and ingested docs)
        run: |
          rm -rf vendor
          # Clean v0.4 nested paths
          rm -rf docs/core-concepts/protocol
          rm -rf docs/core-concepts/miden-vm
          rm -rf docs/core-concepts/node
          rm -rf docs/core-concepts/compiler
          # tools/clients: only clean ingested subdirs; preserve locally-authored web-client/, react-sdk/, index.md
          rm -rf docs/builder/tools/clients/rust-client
          rm -rf docs/builder/tools/clients/img
          rm -rf docs/builder/tools/clients/theme
          rm -f  docs/builder/tools/clients/common-errors.md
          rm -f  docs/builder/tools/clients/_category_.yml
          rm -rf docs/builder/tools/cli
          # tutorials: only clean ingested subdirs/files; preserve locally-authored rust-compiler/, index.md, _category_.json
          rm -rf docs/builder/tutorials/miden-bank
          rm -rf docs/builder/tutorials/components
          rm -rf docs/builder/tutorials/img
          rm -rf docs/builder/tutorials/theme
          rm -f  docs/builder/tutorials/miden_node_setup.md

      - name: Commit snapshots
        run: |
          if ! git diff --quiet; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "docs: cut version ${{ steps.manifest.outputs.version_label }}"
            git push
          else
            echo "No changes to commit."
          fi
